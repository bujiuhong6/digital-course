  <!-- smile -->
  <path fill="none" stroke="#b45309" stroke-width="1.4" stroke-linecap="round" d="M26 39 Q32 43 38 39"/>

  <!-- fringe over face -->
  <path fill="#3730a3" d="M16 26 Q26 14 44 26 Q42 28 38 26 Q34 23 26 23 Q22 23 14 26 Z"/>

  <!-- headset / AI cue -->
  <path fill="#0ea5e9" d="M12 34 Q14 22 26 14 L28 16 Q18 23 17 34 Z"/>
  <ellipse cx="12" cy="36" rx="5" ry="7" fill="#22d3ee" stroke="#0891b2" stroke-width="1"/>
  <circle cx="12" cy="36" r="2" fill="#ccfbf1"/>
</svg>
