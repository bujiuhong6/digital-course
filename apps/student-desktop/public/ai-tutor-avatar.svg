<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd9bd"/>
      <stop offset="100%" stop-color="#e8b896"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)"/>

  <!-- back hair silhouette -->
  <path fill="#312e81" d="M10 42 Q10 22 26 13 Q38 13 54 42 Q52 44 48 40 Q42 38 38 42 Q34 42 26 42 Q14 42 10 42 Z"/>

  <!-- ears -->
  <ellipse cx="12" cy="34" rx="4" ry="6" fill="#e8b896"/>
  <ellipse cx="52" cy="34" rx="4" ry="6" fill="#e8b896"/>

  <!-- neck -->
  <rect x="26" y="44" width="12" height="10" rx="2" fill="#e8b896"/>

  <!-- shirt / collar -->
  <path fill="#22c55e" d="M18 54 L46 54 L52 62 L12 62 Z"/>
  <path fill="#16a34a" d="M26 54 L38 54 L38 62 L26 62 Z"/>

  <!-- face circle -->
  <ellipse cx="32" cy="32" rx="18" ry="20" fill="url(#face)"/>

  <!-- eyes -->
  <ellipse cx="25" cy="30" rx="3.5" ry="4" fill="#1e293b"/>
  <ellipse cx="39" cy="30" rx="3.5" ry="4" fill="#1e293b"/>
  <circle cx="26" cy="29" r="1.2" fill="#fff" opacity="0.9"/>
  <circle cx="40" cy="29" r="1.2" fill="#fff" opacity="0.9"/>

  <!-- glasses hint -->
