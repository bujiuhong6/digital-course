# Nginx site config for digital-course (teacher/API + student SPA).
# Paths and server_name reflect bujiuhong6.top deployment; symlink from
# your panel's site config or include this file after placing certs.

server {
    listen 80;
    listen [::]:80;
    server_name bujiuhong6.top;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bujiuhong6.top;

    ssl_certificate     /www/server/panel/vhost/cert/bujiuhong6.top/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/bujiuhong6.top/privkey.pem;

    client_max_body_size 20m;

    location = / {
        return 302 https://$host/student/;
    }

    location = /student {
        return 301 /student/;
    }

    # Student SPA (Vite build output under student-dist/)
    location /student/ {
        alias /www/wwwroot/digital-course/student-dist/;
        try_files $uri $uri/ /student/index.html;
        add_header Cache-Control "public, max-age=300";
    }

    location ~ ^/(teacher|v1|health|static|favicon\.ico)(/.*)?$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 180s;
    }
}
