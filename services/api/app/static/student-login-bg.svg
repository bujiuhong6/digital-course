<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <title>Digital learning background</title>
  <defs>
    <linearGradient id="bgwash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f8ff"/>
      <stop offset="45%" stop-color="#eef4ff"/>
      <stop offset="100%" stop-color="#ecfdf8"/>
    </linearGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.22"/>
      <stop offset="50%" stop-color="#22d3bb" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.2"/>
    </linearGradient>

    <pattern id="eduTile" width="220" height="220" patternUnits="userSpaceOnUse">
      <rect width="220" height="220" fill="none"/>
      <circle cx="20" cy="24" r="3" fill="#64748b" opacity="0.12"/>
      <circle cx="196" cy="68" r="3" fill="#64748b" opacity="0.1"/>
      <circle cx="120" cy="178" r="3" fill="#64748b" opacity="0.11"/>
      <path
        d="M 18 172 H 92 M 132 172 H 202 M 112 164 v 30"
        fill="none"
        stroke="#6366f1"
        stroke-width="2"
        stroke-linecap="round"
        stroke-opacity="0.18"
      />
      <circle cx="112" cy="172" r="6" fill="none" stroke="#6366f1" stroke-width="2" stroke-opacity="0.22"/>
      <g opacity="0.16" fill="#0f172a">
        <rect x="34" y="46" width="8" height="14" rx="1"/>
        <rect x="46" y="46" width="8" height="14" rx="1"/>
        <rect x="58" y="46" width="8" height="14" rx="1"/>
        <rect x="70" y="46" width="8" height="14" rx="1"/>
        <rect x="46" y="66" width="8" height="14" rx="1"/>
        <rect x="58" y="66" width="8" height="14" rx="1"/>
      </g>
      <path
        d="M 150 118 l-14 12 14 12"
        fill="none"
        stroke="#4f46e5"
        stroke-width="3.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.2"
      />
      <path
        d="M 174 142 l14-12-14-12"
        fill="none"
        stroke="#4f46e5"
        stroke-width="3.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.2"
      />
      <rect x="32" y="118" width="56" height="40" rx="6" fill="none" stroke="#0f766e" stroke-width="2" opacity="0.16"/>
      <path d="M 44 108 v 10 M 60 108 v 10 M 76 108 v 10" stroke="#0f766e" stroke-width="2" opacity="0.14" stroke-linecap="round"/>
      <path d="M 44 158 v -10 M 60 158 v -10 M 76 158 v -10" stroke="#0f766e" stroke-width="2" opacity="0.14" stroke-linecap="round"/>
      <path
        d="M 150 62 Q 174 52 188 74"
        fill="none"
        stroke="#22d3bb"
        stroke-width="2.5"
        stroke-linecap="round"
        opacity="0.2"
      />
    </pattern>

    <pattern id="dotGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.1" fill="#94a3b8" opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="url(#bgwash)"/>
  <circle cx="-40" cy="-30" r="340" fill="url(#rim)" opacity="0.85"/>
  <circle cx="1240" cy="830" r="380" fill="url(#rim)" opacity="0.72"/>
  <rect width="1200" height="800" fill="url(#dotGrid)" opacity="0.55"/>
  <rect width="1200" height="800" fill="url(#eduTile)" opacity="0.85"/>

  <g opacity="0.22">
    <rect x="72" y="520" width="220" height="140" rx="18" transform="rotate(-6 182 590)" fill="none" stroke="#6366f1" stroke-width="2.5"/>
    <path d="M 96 580 h 148" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 96 600 h 118" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
    <path d="M 96 620 h 128" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
    <circle cx="108" cy="556" r="8" fill="#22d3bb" opacity="0.6"/>
    <circle cx="148" cy="556" r="8" fill="#6366f1" opacity="0.5"/>
    <path d="M 116 556 H 140" stroke="#0f172a" stroke-width="2" opacity="0.25" stroke-linecap="round"/>
  </g>

  <g opacity="0.2" transform="translate(780 460) rotate(8)">
    <rect width="260" height="160" rx="20" fill="#ffffff" fill-opacity="0.35"/>
    <path d="M 22 54 h 170" stroke="#475569" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
    <path d="M 22 84 h 120" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" opacity="0.32"/>
    <path d="M 22 112 h 200" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" opacity="0.28"/>
    <rect x="22" y="124" width="42" height="16" rx="4" fill="#6366f1" opacity="0.16"/>
    <path d="M 72 134 h 140" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" opacity="0.22"/>
  </g>

  <g opacity="0.14">
    <rect x="320" y="96" width="520" height="14" rx="7" fill="#6366f1"/>
    <circle cx="340" cy="103" r="4" fill="#ef4444" opacity="0.45"/>
    <circle cx="360" cy="103" r="4" fill="#f59e0b" opacity="0.45"/>
    <circle cx="380" cy="103" r="4" fill="#22c55e" opacity="0.45"/>
  </g>
</svg>
