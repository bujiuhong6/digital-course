<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}教师{% endblock %} — Teaching</title>
  {# HTMX 仅在需要局部刷新的页面加载，避免登录等普通 POST 被脚本干扰 #}
  {% block head %}{% endblock %}
  <style>
    :root { --bg: #0f1419; --card: #1a2332; --text: #e7ecf3; --muted: #8b9cb3; --accent: #3b82f6; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.5; }
    a { color: var(--accent); }
    .wrap { max-width: 56rem; margin: 0 auto; padding: 1.25rem; }
    .card { background: var(--card); border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
    label { display: block; margin: 0.5rem 0 0.25rem; color: var(--muted); font-size: 0.9rem; }
    input, textarea, button, select { font: inherit; }
    input[type="password"], input[type="text"], input[type="file"], textarea {
      width: 100%; padding: 0.5rem 0.65rem; border: 1px solid #2d3a4d; border-radius: 6px; background: #0c1018; color: var(--text);
    }
    textarea { min-height: 12rem; font-family: ui-monospace, monospace; font-size: 0.85rem; }
    textarea[readonly] { cursor: text; color: #cbd5e1; border-color: #334155; }
    button, .btn {
      display: inline-block; padding: 0.5rem 1rem; background: var(--accent); color: #fff; border: none; border-radius: 6px;
      cursor: pointer; text-decoration: none; font-size: 0.95rem;
    }
    button.secondary { background: #334155; }
    .bar { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
    .flash-ok { color: #4ade80; }
    .flash-err { color: #f87171; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { text-align: left; padding: 0.4rem 0.5rem; border-bottom: 1px solid #2d3a4d; }
    .row-actions { white-space: normal; }
    .row-actions .muted { color: #64748b; font-size: 0.8rem; margin: 0 0.15rem; }
    button.link-danger {
      background: none; border: none; color: #f87171; cursor: pointer;
      font: inherit; text-decoration: underline; padding: 0; margin-left: 0.35rem;
    }
    button.link-danger:hover { color: #fecaca; }
  </style>
</head>
<body>
  <div class="wrap">
    {% block body %}{% endblock %}
  </div>
</body>
</html>
