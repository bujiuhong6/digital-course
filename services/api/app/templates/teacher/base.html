<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}教师{% endblock %} — Teaching</title>
  {% block head %}{% endblock %}
  <style>
    :root {
      --bg: #eef2f7;
      --bg-muted: #f1f5f9;
      --bg-elevated: #ffffff;
      --border: #e2e8f0;
      --border-strong: #cbd5e1;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-soft: rgba(37, 99, 235, 0.08);
      --success: #047857;
      --success-soft: #ecfdf5;
      --warn: #b45309;
      --danger: #b91c1c;
      --danger-hover: #991b1b;
      --danger-soft: #fef2f2;
      --input-bg: #ffffff;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow-card: 0 1px 2px rgba(15, 23, 42, 0.05), 0 4px 16px rgba(15, 23, 42, 0.06);
      --shadow-header: 0 1px 0 rgba(15, 23, 42, 0.05);
      --transition: color 0.18s ease, background-color 0.18s ease, border-color 0.18s ease;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      * { transition: none !important; }
    }

    body {
      margin: 0;
      font-family:
        ui-sans-serif, -apple-system, "BlinkMacSystemFont",
        "PingFang SC", "Hiragino Sans GB",
        "Microsoft YaHei", "Noto Sans SC", sans-serif;
      line-height: 1.55;
      color: var(--text);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(37, 99, 235, 0.07), transparent 52%),
        linear-gradient(to bottom, #f8fafc 0%, var(--bg) 28%);
      min-height: 100vh;
    }

    a {
      color: var(--accent);
      text-underline-offset: 0.14em;
    }
    a:hover { color: var(--accent-hover); }

    code {
      padding: 0.1rem 0.35rem;
      border-radius: 6px;
      background: var(--bg-muted);
      font-size: 0.875em;
    }

    .muted { color: var(--muted); }

    /* —— Site shell —— */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem 1.25rem;
      padding: 0.9rem clamp(1rem, 3vw, 1.75rem);
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-header);
    }

    .site-header--minimal {
      justify-content: center;
      border-bottom-style: dashed;
    }

    .site-brand {
      font-weight: 700;
      font-size: 1.125rem;
      letter-spacing: 0.02em;
      color: var(--text);
      text-decoration: none;
      flex: 1 1 auto;
      min-width: 0;
    }
    .site-brand:hover {
      color: var(--accent);
      text-decoration: none;
    }
    .site-brand--static {
      cursor: default;
      color: var(--text);
    }
    .site-brand--static:hover { color: var(--text); }

    .site-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem 0.15rem;
    }

    .site-nav-link {
      display: inline-block;
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      font-size: 0.925rem;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      border: 1px solid transparent;
      transition: var(--transition);
    }
    .site-nav-link:hover {
      background: var(--bg-muted);
      color: var(--accent);
      text-decoration: none;
    }
    .site-nav-link:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    main.wrap {
      max-width: min(1160px, 92vw);
      margin: 0 auto;
      padding: clamp(1rem, 2.8vw, 1.85rem);
    }

    /* —— Layout primitives —— */
    .page-heading {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.85rem;
      margin: 0 0 1.25rem;
    }
    .page-title-group {
      flex: 1 1 15rem;
      min-width: 0;
    }
    .page-title {
      margin: 0;
      font-size: clamp(1.35rem, 2.8vw, 1.85rem);
      font-weight: 700;
      line-height: 1.28;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .page-subtitle {
      margin: 0.35rem 0 0;
      font-size: 0.91rem;
      color: var(--muted);
      max-width: 44rem;
    }
    .page-heading-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 0.45rem;
    }

    .section-header {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.5rem 1rem;
      margin-bottom: 0.75rem;
    }
    .section-header h2 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 0.75rem 1rem;
      margin-bottom: 0;
    }
    .toolbar-field {
      flex: 1 1 14rem;
      min-width: min(100%, 12rem);
    }
    .toolbar-field label {
      display: block;
      margin-bottom: 0.3rem;
    }
    .toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 0.5rem;
      flex: 0 0 auto;
    }

    .bulk-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.45rem;
      padding: 0.55rem 0.85rem;
      margin: 0 0 0.85rem;
      background: var(--bg-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }

    .form-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .form-actions.mt-0 { margin-top: 0; }

    .danger-zone {
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      border: 1px dashed #fecaca;
      background: linear-gradient(to bottom right, var(--danger-soft), #ffffff);
      max-width: 100%;
    }
    .danger-zone .muted { margin: 0 0 0.4rem; font-size: 0.85rem; }

    .card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(1rem, 2.2vw, 1.35rem);
      margin-bottom: 1rem;
      box-shadow: var(--shadow-card);
    }

    .login-shell {
      max-width: min(420px, 100%);
      margin-inline: auto;
    }

    .card > h2:first-child,
    .card > .section-header:first-child h2:first-child {
      margin-top: 0;
    }

    label {
      display: block;
      margin: 0.5rem 0 0.3rem;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 500;
    }

    input, textarea, button, select {
      font: inherit;
      border-radius: var(--radius-sm);
    }

    input[type="password"],
    input[type="text"],
    input[type="file"],
    textarea,
    select:not([multiple]) {
      width: 100%;
      padding: 0.52rem 0.72rem;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
    }
    textarea {
      min-height: 11rem;
      font-family: ui-monospace, "Cascadia Code", "Segoe UI Mono", monospace;
      font-size: 0.85rem;
    }
    textarea[readonly] {
      cursor: text;
      color: var(--text);
      background: var(--bg-muted);
      border-color: var(--border-strong);
    }

    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible,
    button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    thead th {
      font-weight: 600;
      text-align: left;
      padding: 0.55rem 0.65rem;
      background: linear-gradient(to bottom, #f8fafc, var(--bg-muted));
      border-bottom: 1px solid var(--border);
      color: #334155;
    }
    td {
      padding: 0.55rem 0.65rem;
      vertical-align: top;
      border-bottom: 1px solid var(--border);
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(248, 250, 252, 0.85); }
    tbody tr:nth-child(even) td { background-color: rgba(248, 250, 252, 0.4); }

    /* 提交等一览表：学号/姓名/分数/时间单行显示；极窄或缩放时横向滚动。 */
    .table-submissions-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-inline: -0.2rem;
      padding-inline: 0.2rem;
    }
    table.table-submissions {
      width: max-content;
      min-width: 100%;
      table-layout: auto;
    }
    table.table-submissions .col-nowrap,
    table.table-submissions th.col-nowrap {
      white-space: nowrap;
    }
    table.table-submissions th.col-feedback-h {
      white-space: nowrap;
      text-align: center;
    }
    table.table-submissions td.col-feedback {
      white-space: normal;
      min-width: 14rem;
      max-width: min(40rem, 85vw);
      word-break: break-word;
    }

    .actions-head { width: min(14rem, 28%); white-space: nowrap; text-align: right; }

    /* Dashboard chapter list: header aligns with 「完成记录」 (row links stay right-aligned). */
    .chapter-dashboard-table thead th.actions-head {
      padding: 0.55rem 4.35rem 0.55rem 0.65rem;
    }

    .actions-cell {
      text-align: right;
      white-space: normal;
      vertical-align: middle;
    }
    .actions-cell form { vertical-align: middle; }

    .row-actions {
      white-space: normal;
      text-align: right;
    }

    /* Buttons */
    button, .btn {
      display: inline-block;
      padding: 0.48rem 1rem;
      background: var(--accent);
      color: #ffffff;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: var(--transition);
      line-height: 1.3;
      box-sizing: border-box;
    }
    button:hover, .btn:hover {
      background: var(--accent-hover);
      text-decoration: none;
      color: #ffffff;
    }
    button.secondary, .btn.secondary {
      background: #ffffff;
      color: var(--text);
      border-color: var(--border-strong);
    }
    button.secondary:hover, .btn.secondary:hover {
      background: var(--bg-muted);
      color: var(--accent);
      border-color: var(--accent);
    }
    button.ghost,
    .btn.ghost {
      background: transparent;
      border-color: transparent;
      color: var(--muted);
      font-weight: 500;
    }
    button.ghost:hover,
    .btn.ghost:hover {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .btn-publish {
      background: #059669 !important;
      border-color: #059669 !important;
      color: #ffffff !important;
    }
    .btn-publish:hover {
      background: #047857 !important;
      border-color: #047857 !important;
    }

    .btn-danger-solid {
      background: var(--danger) !important;
      border-color: var(--danger) !important;
      color: #ffffff !important;
    }
    .btn-danger-solid:hover {
      background: var(--danger-hover) !important;
      border-color: var(--danger-hover) !important;
    }

    .btn.sm { padding: 0.32rem 0.62rem; font-size: 0.865rem; }
    button.secondary.sm,
    button.sm.secondary {
      padding: 0.32rem 0.62rem;
      font-size: 0.865rem;
    }
    button.btn-danger-solid.sm,
    .btn-danger-solid.sm {
      padding: 0.32rem 0.62rem;
      font-size: 0.865rem;
    }

    button.link-danger,
    button.link-danger[type="submit"] {
      background: transparent;
      border: none;
      padding: 0;
      margin-inline-start: 0.35rem;
      color: var(--danger);
      text-decoration: underline;
      font: inherit;
      cursor: pointer;
      font-weight: 500;
    }
    button.link-danger:hover {
      color: var(--danger-hover);
    }

    /* Flash —— */
    .flash-ok { color: var(--success); font-weight: 600; }
    .flash-warn { color: var(--warn); font-weight: 600; }
    .flash-err { color: var(--danger); font-weight: 600; }

    /* Chapter dashboard rename */
    .chapter-title-cell {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .chapter-rename-btn {
      flex: 0 0 auto;
      position: relative;
      z-index: 1;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      padding: 0.06rem 0.28rem;
      font-size: 0.95rem;
      line-height: 1;
      transition: var(--transition);
    }
    .chapter-rename-btn:hover,
    .chapter-rename-btn:focus-visible {
      color: var(--accent);
      border-color: var(--accent);
      outline: none;
    }

    .chapter-title-inline-rename {
      flex: 1;
      min-width: 4rem;
      max-width: 100%;
      font: inherit;
      padding: 0.1rem 0.25rem;
    }

    /* Roster modal (shared styles; roster markup keeps ID) —— */
    #roster-bulk-class-dialog {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0;
      background: var(--bg-elevated);
      color: var(--text);
      max-width: 22rem;
      box-shadow: var(--shadow-card);
    }
    #roster-bulk-class-dialog::backdrop {
      background: rgba(15, 23, 42, 0.45);
    }
    #roster-bulk-class-dialog .roster-dialog-body {
      padding: 1.1rem 1.25rem;
    }
    #roster-bulk-class-dialog .roster-dialog-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      justify-content: flex-end;
      padding: 0.65rem 1.25rem 1rem;
      border-top: 1px solid var(--border);
      background: var(--bg-muted);
    }
    #roster-bulk-class-dialog h3 {
      margin: 0 0 0.45rem;
      font-size: 1.05rem;
      font-weight: 600;
    }
    #roster-bulk-class-dialog p.roster-dialog-help {
      margin: 0 0 0.75rem;
      font-size: 0.9rem;
      color: var(--muted);
    }
    #roster-bulk-class-dialog select {
      width: 100%;
      padding: 0.5rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--input-bg);
      color: inherit;
    }

    .inline-form-actions {
      display: inline-flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin: 0;
      justify-content: flex-end;
      max-width: 100%;
    }

    .class-card-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .class-card-row {
      display: flex;
      align-items: stretch;
      gap: 0.5rem;
    }
    .class-card-row .class-card-link {
      flex: 1;
      min-width: 0;
    }
    .class-card-delete {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .class-card-link {
      display: block;
      padding: 0.8rem 1rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: linear-gradient(to bottom right, #ffffff 0%, #f8fafc 100%);
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition);
      box-shadow: 0 1px 1px rgba(15, 23, 42, 0.04);
    }
    .class-card-link:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.1);
      text-decoration: none;
    }

    /* Legacy compat: old .bar / .bar-actions */
    .bar {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .bar > .bar-title-row:first-child .page-title-group h1 {
      margin: 0;
    }
    .bar-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      align-items: center;
      justify-content: flex-end;
      width: 100%;
      margin-inline-start: auto;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* Small screens —— */
    @media (max-width: 42rem) {
      .bulk-toolbar .btn,
      .bulk-toolbar button.secondary {
        flex: 1 1 calc(50% - 0.25rem);
        justify-content: center;
      }
      .toolbar-actions .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
{% block site_header %}
<header class="site-header" role="banner">
  <a class="site-brand" href="/teacher/login?show=1">教师工作台</a>
  <nav class="site-nav" aria-label="主导航">
    <a class="site-nav-link" href="/teacher/prestudy">AI智能预习</a>
    <a class="site-nav-link" href="/teacher">AI课堂助教</a>
    <a class="site-nav-link" href="/teacher/post-exercises">AI课后练习</a>
    <a class="site-nav-link" href="/teacher/llm-settings">大模型接入</a>
    <a class="site-nav-link" href="/teacher/roster">学生名单</a>
    <a class="site-nav-link" href="/teacher/classes">班级管理</a>
  </nav>
</header>
{% endblock %}
<main class="wrap">
{% block body %}{% endblock %}
</main>
</body>
</html>
